<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="frontend.css">
</head>
<body>
    <h1>SIGN UP </h1>
    <form action="login.html">
        <label for="name">Name</label>
        <input type="text" placeholder="Enter your name" id="name"><br><br>
        <label for="contact">Contact</label>
        <input type="number" id="contact" placeholder="Enter your contact no"><br><br>
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter your age"><br><br>
        <label for="">Gender</label>
        <input type="radio" name="gender" id="">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">Others
        <br><br>
        <label for="">Courses</label>
        <input type="checkbox">C++
        <input type="checkbox">Python
        <input type="checkbox">Java
        <input type="checkbox">GitHub
        <br><br>
        <label for="email">Email</label>
        <input type="email" placeholder="Enter your Email" id="email">
        <br><br>
        <label for="pass">Password</label>
        <input type="password" id="pass" placeholder="Enter your password">
        <br><br>
        <label for="res">Resume</label>
        <input type="file" id="res">
        <br><br>
        <label for="">your city</label>
        <select name="" id="">
            <option value="">Select city</option>
            <option value="">Bhopal</option>
            <option value="">Jabalpur</option>
            <option value="">Sagar</option>
            <option value="">Banglore</option>
        </select>
        <input type="submit">
    </form>

</body>
</html>
